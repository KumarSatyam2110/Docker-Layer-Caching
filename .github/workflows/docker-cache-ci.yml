name: Docker Build with Cache

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: krsatyam21
          password: ${{ secrets.DOCKER_PASSWORD1 }}

      - name: Build and Push Docker Image with Layer Caching
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: krsatyam21/my-image:latest
          cache-from: type=registry,ref=krsatyam21/my-image:latest
          cache-to: type=registry,ref=krsatyam21/my-image:buildcache,mode=max
